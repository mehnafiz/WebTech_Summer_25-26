<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Confirmation Form</title>
</head>
<body>
    <h1>Student Confirmation Form</h1>
    <form>
        <table>
            <tr>
                <td>Student Name:</td>
                <td><input type="text" name="student_name"></td>
            </tr>
            <tr>
                <td>Email Address:</td>
                <td><input type="email" name="email"></td>
            </tr>
            <tr>
                <td>Preferred Internship:</td>
                <td><input type="radio" name="internship" value="On-Site"> On-Site<br>
                    <input type="radio" name="internship" value="Remote"> Remote<br> 
            </tr>
            <tr>
                <td>Internship Duration:</td>
                <td>
                    <select name="internship_duration">
                        <option value="6 Weeks">6 Weeks</option>
                        <option value="3 Months">3 Months</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>Skills of Interest:</td>
                <td>
                    <input type="checkbox" name="skills" value="Web Development"> Web Development<br>
                    <input type="checkbox" name="skills" value="Data Analysis"> Data Analysis<br>
                    <input type="checkbox" name="skills" value="Mobile Apps"> Mobile Apps<br>
                </td>
            </tr>
            <tr>
                <td><input type="submit" value="Submit"></td>
            </tr>
        </table>
    </form>
</body>
</html>
